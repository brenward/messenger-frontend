<div id="chat-container">
    <h3>Current Chat: {{ currentChat?.chatName }}</h3>
    <div id="chat-area">
        @for (message of currentChat?.messages; track $index) {
            <p>{{ message.message }}</p>
        }@empty {
            <p>No messages yet.</p>
        }
    </div>
    <div id="write-chat">
        <input id="new-chat" type="text">
        <button class="btn btn-primary">Post</button>
    </div>
</div>
