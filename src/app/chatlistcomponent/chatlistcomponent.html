<div id="chatlist-container">
    <h3>Select Existing Chat</h3>
    <div id="chats-list">
        @for(chat of chats; track chat.id){
            <p (click)="onSelectChat(chat)">{{chat.chatName}}</p>
        }@empty {
            <p>No chats available</p>
        }
    </div>
    <div id="add-chat">
        <input type="text">
        <button class="btn btn-primary" (click)="onAdd()">Add</button>
    </div>
</div>
