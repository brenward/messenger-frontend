<div id="user-containter">
    @if (userSet){
        <h2>Welcome {{username}}</h2>
    }
    @else {
        <h2>Enter Username:</h2>
        <input type="text" #usernameInput>
        <button class="btn btn-primary" (click)="onUserNameEntered(usernameInput)">Login</button>
        <p class="error-message">{{errorMessage}}</p>
    }
    
</div>
